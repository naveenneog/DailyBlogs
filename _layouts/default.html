<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <div class="page-glow" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">◆</span>
        <span class="brand-name">AI4<span class="accent">Good</span></span>
      </a>
      <nav class="site-nav">
        {% for link in site.nav_links %}
          <a href="{{ link.url | relative_url }}" class="nav-link{% if page.url == link.url %} active{% endif %}">{{ link.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="wrap site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span class="foot-brand">AI4<span class="accent">Good</span></span>
      <span class="foot-meta">{{ site.description }}</span>
      <span class="foot-links">
        <a href="https://www.linkedin.com/in/naveen-gopalakrishna-99863040/">LinkedIn</a>
        <a href="https://github.com/naveenneog/AI4Good">GitHub</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </span>
    </div>
    <div class="wrap foot-copy">© {{ site.time | date: '%Y' }} Naveen Gopalakrishna · #AI4Good · built with Jekyll · Lamplight theme</div>
  </footer>
</body>
</html>
