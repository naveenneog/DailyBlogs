title: DailyBlogs
description: A general-topic blog on cloud, AI, and engineering — one build a day.
author: naveenneog
theme: minima
baseurl: ""
url: "https://naveenneog.github.io/DailyBlogs"

minima:
  skin: dark

header_pages:
  - about.md
  - sidequest.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
